services:
    db:
        image: mysql:latest
        container_name: mysql_latest
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: lumio_app
            MYSQL_USER: admin
            MYSQL_PASSWORD: admin
        ports:
            - '3306:3306'
        volumes:
            - mysql_data:/var/lib/mysql

    minio:
        image: minio/minio
        container_name: lumio-minio
        ports:
            - '9000:9000'
            - '9001:9001'
        environment:
            MINIO_ROOT_USER: admin
            MINIO_ROOT_PASSWORD: admin123
        command: server /data --console-address ":9001"
        volumes:
            - minio_data:/data

volumes:
    mysql_data:
    minio_data:
